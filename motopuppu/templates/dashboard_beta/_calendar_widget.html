{# motopuppu/templates/dashboard_beta/_calendar_widget.html #}
<div class="beta-widget-card" data-widget-name="calendar">
    <div class="beta-widget-header" data-bs-toggle="collapse" data-bs-target="#collapse-calendar-beta" aria-expanded="true">
        <div class="beta-widget-header-left">
            <span class="widget-grab-handle me-2" title="ドラッグして並び替え"><i class="fas fa-grip-vertical"></i></span>
            <div class="beta-widget-icon" style="background: rgba(59, 130, 246, 0.15); color: var(--beta-accent-blue);"><i class="fas fa-calendar-alt"></i></div>
            <span class="beta-widget-title">記録カレンダー</span>
        </div>
        <i class="fas fa-chevron-down beta-widget-chevron"></i>
    </div>
    <div id="collapse-calendar-beta" class="collapse show">
        <div class="beta-widget-body">
            <div id='calendar'></div>
        </div>
    </div>
</div>

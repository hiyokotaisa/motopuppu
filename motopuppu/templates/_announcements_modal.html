<div class="modal fade" id="announcementsModal" tabindex="-1" aria-labelledby="announcementsModalLabel" aria-hidden="true"
     hx-on:hidden.bs.modal="this.remove()">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="announcementsModalLabel"><i class="fas fa-bullhorn me-2 text-info"></i>もとぷっぷー公式からのお知らせ</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small mb-3">
                    <i class="fas fa-external-link-alt me-1"></i>
                    <a href="https://misskey.io/@motopuppu" target="_blank" rel="noopener noreferrer">@motopuppu</a> の最新ポストを表示しています。
                </p>
                {% for note in announcements %}
                <div class="mb-3 pb-3 {% if not loop.last %}border-bottom{% endif %}">
                    <div class="d-flex justify-content-between align-items-start mb-1">
                        <small class="text-muted">
                            <i class="far fa-clock me-1"></i>{{ note.createdAt | to_jst }}
                        </small>
                        <a href="https://misskey.io/notes/{{ note.id }}" target="_blank" rel="noopener noreferrer"
                           class="btn btn-sm btn-outline-info py-0 px-2" style="font-size: 0.75rem;">
                            <i class="fas fa-external-link-alt me-1"></i>Misskeyで見る
                        </a>
                    </div>
                    <div class="mb-0 small">{{ note.text | simple_markdown }}</div>
                </div>
                {% else %}
                <p class="text-muted text-center py-3">
                    <i class="fas fa-info-circle me-1"></i>現在、表示できるお知らせはありません。
                </p>
                {% endfor %}
            </div>
            <div class="modal-footer d-flex justify-content-center border-0 pt-0">
                <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">閉じる</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        var modalEl = document.getElementById('announcementsModal');
        if (modalEl) {
            var modal = new bootstrap.Modal(modalEl);
            modal.show();
        }
    })();
</script>

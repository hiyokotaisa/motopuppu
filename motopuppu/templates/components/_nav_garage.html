{% if g.user_motorcycles %}
{% for motorcycle in g.user_motorcycles %}
<li>
    <a class="dropdown-item d-flex align-items-center py-2 hover-primary" href="{{ url_for('vehicle.dashboard', vehicle_id=motorcycle.id) }}" title="{{ motorcycle.name }}のダッシュボードを開く">
        {% if motorcycle.image_url %}
        <img src="{{ motorcycle.image_url }}" alt="{{ motorcycle.name }}" class="rounded-circle me-3 border" style="width: 32px; height: 32px; object-fit: cover;">
        {% else %}
        <div class="bg-light rounded-circle d-flex align-items-center justify-content-center me-3 border" style="width: 32px; height: 32px;">
            <i class="fas fa-motorcycle text-secondary"></i>
        </div>
        {% endif %}
        <span class="text-truncate flex-grow-1 fw-bold">{{ motorcycle.name }}</span>
        <i class="fas fa-angle-right ms-2 text-muted small"></i>
    </a>
</li>
{% endfor %}
{% else %}
<li>
    <span class="dropdown-item text-muted py-3 text-center">車両が登録されていません</span>
</li>
{% endif %}
<li><hr class="dropdown-divider"></li>
<li>
    <a class="dropdown-item py-2 text-primary" href="{{ url_for('vehicle.vehicle_list') }}">
        <i class="fas fa-cog fa-fw me-2"></i>車両の追加・編集・並び替え
    </a>
</li>

<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>Media Share 認証</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f8f9fa;
            color: #212529;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
        }
        .card {
            background: #fff;
            border-radius: 0.5rem;
            padding: 1.5rem 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            max-width: 380px;
            text-align: center;
        }
        h1 { font-size: 1.1rem; margin: 0 0 0.5rem; }
        p { margin: 0.3rem 0; color: #495057; font-size: 0.9rem; }
        .ok { color: #198754; font-size: 2rem; }
        .err { color: #dc3545; font-size: 2rem; }
        button {
            margin-top: 1rem;
            padding: 0.4rem 1rem;
            background: #6c757d;
            color: #fff;
            border: 0;
            border-radius: 0.25rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        {% if status == 'ok' %}
            <div class="ok">&#x2714;</div>
            <h1>Media Share との連携が完了しました</h1>
            <p>このウィンドウは自動的に閉じます。</p>
        {% else %}
            <div class="err">&#x2716;</div>
            <h1>連携に失敗しました</h1>
            <p>{{ error_message or '不明なエラーが発生しました。' }}</p>
            <p>このウィンドウを閉じて、もう一度お試しください。</p>
        {% endif %}
        <button type="button" onclick="window.close();">ウィンドウを閉じる</button>
    </div>

    <script>
        (function() {
            var payload = {
                source: 'motopuppu-media-share',
                status: {{ ('"ok"' if status == 'ok' else '"error"') | safe }},
                eventId: {{ event_id|tojson }},
                intent: {{ intent|tojson }},
            };
            try {
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage(payload, window.location.origin);
                }
            } catch (e) { /* ignore */ }

            if (payload.status === 'ok') {
                setTimeout(function() {
                    try { window.close(); } catch (e) { /* ignore */ }
                }, 800);
            }
        })();
    </script>
</body>
</html>
